version: 2

# Updates are grouped so a week of patch bumps arrives as one reviewable PR
# rather than twenty. Security updates are deliberately left ungrouped by
# GitHub, so they still land immediately and on their own.
#
# Every ecosystem sets a `cooldown`: the most common supply-chain attack on a
# dependency is a *freshly published* malicious version of a legitimate package,
# and it is usually yanked within days. Waiting a week before proposing a bump
# costs nothing here and removes that window. Cooldown does not apply to
# security updates, so a real CVE fix still arrives immediately.
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      rust-minor-patch:
        update-types: [minor, patch]
    ignore:
      # sea-orm's major version is not ours to choose: loco-rs 0.16.4 pins
      # sea-orm 1.1, so taking 2.x here puts two incompatible copies in the
      # tree and the entities stop satisfying loco's traits —
      # "the trait bound users::ActiveModel: ActiveModelBehavior is not
      # satisfied", ten times over. Verified by trying it (PRs #10/#11).
      #
      # Minor and patch updates still come through; only the major is held.
      # REMOVE this once loco-rs releases against sea-orm 2, at which point the
      # loco bump and this one have to land together.
      - dependency-name: sea-orm
        update-types: ["version-update:semver-major"]
      - dependency-name: sea-orm-migration
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  # Actions are the supply chain of the pipeline itself: a compromised action
  # runs with the workflow's token, which is why every `uses:` is pinned to a
  # full commit SHA. Dependabot understands SHA pins and rewrites both the SHA
  # and its trailing version comment — pinning does not mean going stale.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        update-types: [major, minor, patch]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
