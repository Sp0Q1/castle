{{- if .Values.database.internal }}
# Per-tenant Postgres (one logical DB per client). Stays inside the tenant
# namespace and never has a network path out (see networking.yaml).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app: {{ .Release.Name }}-postgres
spec:
  clusterIP: None
  selector:
    app: {{ .Release.Name }}-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-postgres
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-postgres
        castle.io/component: db
    spec:
      {{- with .Values.runtimeClassName }}
      {{- if . }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- end }}
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.database.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.database.storageClass }}
        {{- if . }}
        storageClassName: {{ . }}
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.storageSize }}
---
{{- end }}
# Volume for uploaded finding images (always present; also hosts a local sqlite
# DB when database.internal=false).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-uploads
  labels:
    app: {{ .Release.Name }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.database.storageClass }}
  {{- if . }}
  storageClassName: {{ . }}
  {{- end }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.uploadsStorageSize | default "1Gi" }}
