{{- $host := printf "%s.%s" .Values.codename .Values.baseDomain -}}
{{- /* External URL may carry a non-standard port (e.g. :8443 in local kind). */ -}}
{{- $hostPort := $host -}}
{{- if ne (toString .Values.externalPort) "443" }}{{- $hostPort = printf "%s:%v" $host .Values.externalPort -}}{{- end -}}
{{- $appUrl := printf "https://%s/" $hostPort -}}
{{- /* When the oauth2-proxy sidecar is present, castle binds to loopback so only
       the sidecar can reach it. Without it, castle must listen on 0.0.0.0. */ -}}
{{- $binding := ternary "127.0.0.1" "0.0.0.0" .Values.oauth2Proxy.enabled -}}
{{- /* With the sidecar: proxy auth (headers). Without it: built-in login. */ -}}
{{- $authMode := ternary "proxy" "jwt" .Values.oauth2Proxy.enabled -}}
{{- /* Build the RP-initiated logout target: oauth2-proxy sign_out -> Keycloak
       end-session -> back to the app. urlquery escapes each nested layer. */ -}}
{{- $kcLogout := printf "%s/protocol/openid-connect/logout?post_logout_redirect_uri=%s&client_id=%s" .Values.keycloak.issuerUrl (urlquery $appUrl) .Values.keycloak.clientId -}}
{{- $logoutUrl := printf "/oauth2/sign_out?rd=%s" (urlquery $kcLogout) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    castle.io/component: app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        castle.io/component: app
    spec:
      {{- with .Values.runtimeClassName }}
      {{- if . }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        # Numeric UID: k8s can't verify a named user (image USER) is non-root.
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        # castle. Binds {{ $binding }} ({{ if .Values.oauth2Proxy.enabled }}loopback: only the sidecar reaches it{{ else }}direct: fronted externally{{ end }}).
        - name: castle
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["start", "--environment", "production", "--binding", "{{ $binding }}", "--port", "5150"]
          env:
            - name: HOST
              value: {{ $appUrl | quote }}
            - name: CASTLE_AUTH_MODE
              value: {{ $authMode | quote }}
            - name: CASTLE_HONEYPOT
              value: {{ .Values.honeypot | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app
                  key: JWT_SECRET
            - name: CASTLE_PROXY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app
                  key: CASTLE_PROXY_SECRET
            - name: CASTLE_LOGOUT_URL
              value: {{ $logoutUrl | quote }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources.castle | nindent 12 }}
        {{- if .Values.oauth2Proxy.enabled }}
        # oauth2-proxy: the ONLY thing that talks to castle; does OIDC to Keycloak.
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url={{ .Values.keycloak.issuerUrl }}
            - --client-id={{ .Values.keycloak.clientId }}
            - --redirect-url={{ printf "https://%s/oauth2/callback" $hostPort }}
            - --upstream=http://127.0.0.1:5150
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --scope=openid email profile
            - --pass-user-headers=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --reverse-proxy=true
            - --cookie-secure=true
            - --code-challenge-method=S256
            - --cookie-csrf-per-request=true
            - --cookie-csrf-expire=5m
            - --whitelist-domain={{ .Values.keycloak.whitelistDomain }}
            {{- range .Values.oauth2Proxy.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-app
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources.oauth2Proxy | nindent 12 }}
        {{- end }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-uploads
