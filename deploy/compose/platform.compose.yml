# Shared platform: the edge (Caddy) and the IdP (Keycloak + its Postgres).
# Brought up once; tenants and canaries are separate per-codename compose files
# that join the `castle_edge` and `castle_kc` networks this file creates.
#
#   docker compose -f platform.compose.yml up -d
#
# Values come from .env (see .env.example).

networks:
  # Caddy <-> each codename's oauth2-proxy. Named explicitly so per-codename
  # compose files can join it as `external`.
  edge:
    name: castle_edge
  # oauth2-proxies <-> Keycloak (OIDC backchannel), and Keycloak <-> its DB.
  kc:
    name: castle_kc

volumes:
  keycloak_db: {}
  caddy_data: {}
  dns_data: {}

services:
  # Self-hosted authoritative DNS for $BASE_DOMAIN (Option 3). Opt-in: it only
  # starts under the `self-dns` profile —
  #   docker compose -f platform.compose.yml --profile self-dns up -d
  # Run `castlectl dns-init` first to generate DDNS_TSIG_SECRET, and delegate
  # $BASE_DOMAIN to this box (NS + glue) at your registrar. See docs/self-hosted-dns.md.
  dns:
    image: docker.io/internetsystemsconsortium/bind9:9.20
    restart: unless-stopped
    profiles: ["self-dns"]
    # Host networking, NOT published ports: BIND binds the host's real :53 via
    # listen-on {public IP; 127.0.0.1} (see dns/named.conf.template), so it never
    # touches the podman bridge gateways and coexists with aardvark-dns (podman's
    # own per-network :53 for container name resolution). Publishing 0.0.0.0:53
    # instead makes aardvark fail with "address already in use".
    network_mode: host
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:?set BASE_DOMAIN in .env}
      PUBLIC_IP: ${PUBLIC_IP:?set PUBLIC_IP in .env for self-hosted DNS}
      DDNS_TSIG_SECRET: ${DDNS_TSIG_SECRET:?run 'castlectl dns-init' and put the value in .env}
      # Nameserver name the zone advertises. Defaults to ns1.<apex>; override in
      # .env with a name in the PARENT zone (e.g. ns1.example.com) to delegate
      # glue-free — see docs/self-hosted-dns.md.
      NS_NAME: ${NS_NAME:-ns1.${BASE_DOMAIN}}
    volumes:
      - ./dns/entrypoint.sh:/entrypoint.sh:ro,z
      - ./dns/named.conf.template:/templates/named.conf.template:ro,z
      - ./dns/db.zone.template:/templates/db.zone.template:ro,z
      - dns_data:/var/lib/bind
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    # named binds :53 then drops to the unprivileged bind user, and seeds its
    # data dir on first boot; nothing else.
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, SETUID, SETGID, CHOWN, DAC_OVERRIDE]
    security_opt:
      - no-new-privileges:true

  caddy:
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks: [edge, kc]
    environment:
      # The sso vhost substitutes {$KC_HOST}; Caddy reads it from here.
      KC_HOST: ${KC_HOST:?set KC_HOST in .env}
      # The global Caddyfile sets `email {$ACME_EMAIL}` for the IdP cert's ACME
      # account; without it the directive has no argument and Caddy won't parse.
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./caddy/sites:/etc/caddy/sites:ro,z
      # Pre-issued certs (bulk). Caddy serves these; it never issues its own.
      - ./caddy/certs:/certs:ro,z
      - caddy_data:/data
    # Drop every capability except the two Caddy needs to bind 80/443 as non-root.
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true

  keycloak-db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    networks: [kc]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?set KC_DB_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - keycloak_db:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak", "-d", "keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    # `start` = production mode (not start-dev). Implicit build at boot from the
    # env below; bake an optimized image later to skip it.
    command: ["start"]
    networks: [edge, kc]
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      # Public URL browsers use + the token issuer. TLS terminates at Caddy, so
      # Keycloak speaks HTTP and trusts the forwarded headers.
      KC_HOSTNAME: ${KC_PUBLIC_URL:?set KC_PUBLIC_URL in .env}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # First-boot admin — rotate to a named MFA admin, then remove these.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:?set KC_ADMIN_USER in .env}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASS:?set KC_ADMIN_PASS in .env}
      KC_HEALTH_ENABLED: "true"
    healthcheck:
      # KC 26 exposes health on the management port 9000.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    security_opt:
      - no-new-privileges:true
