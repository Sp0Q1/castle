# =============================================================================
# The canary swarm backend.
#
# ONE shared castle instance serves EVERY decoy subdomain. It runs the real
# castle image (so its fingerprint is identical to a tenant) but with a throwaway
# database and no real client data. Any interaction is high-signal: nobody
# legitimate is ever here.
#
# The per-decoy Ingress + Certificate objects are generated by the control plane
# (a sample is at the bottom). They all point at the `honeypot` Service, so the
# "swarm" costs one backend regardless of how many codenames you float.
#
# NOTE on fidelity: the initial phase reliably captures the high-value signal —
# recon, subdomain probing, and credential-stuffing at the SSO login. Perfect
# post-login deception across many hosts (per-host OIDC callback, seeded fake
# findings, a purpose-built honeypot mode that logs submitted passwords and
# tarpits) is a documented follow-up (see README).
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honeypot
  namespace: castle-honeypot
  labels:
    app: honeypot
    castle.io/component: honeypot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: honeypot
  template:
    metadata:
      labels:
        app: honeypot
        castle.io/component: honeypot
      annotations:
        # Ship every line of stdout — this pod's logs ARE the threat intel.
        castle.io/log-scrape: "verbose"
    spec:
      runtimeClassName: kata
      securityContext:
        runAsNonRoot: true
        # Numeric UID: k8s can't verify a named user (image USER) is non-root.
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: castle
          image: ghcr.io/your-org/castle:0.1.0
          # Honeypot mode (CASTLE_HONEYPOT=true): serve the normal login surface
          # but CAPTURE every submitted credential + attacker metadata to the
          # `castle::honeypot` log target, return believable responses, and
          # persist NOTHING. Throwaway sqlite on emptyDir; no real accounts.
          args: ["start", "--environment", "production", "--binding", "0.0.0.0", "--port", "5150"]
          env:
            - name: CASTLE_HONEYPOT
              value: "true"
            - name: CASTLE_AUTH_MODE
              value: "jwt"          # present a login form (captured, not real)
            - name: DATABASE_URL
              value: "sqlite:///data/canary.sqlite?mode=rwc"
            - name: JWT_SECRET
              value: "Y2FuYXJ5LWR1bW15LWp3dC1zZWNyZXQtbm90LXVzZWQtaW4tcHJveHktbW9kZQ=="
          volumeMounts:
            - name: scratch
              mountPath: /data
            - name: uploads
              mountPath: /app/uploads
          ports:
            - containerPort: 5150
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: scratch
          emptyDir: {}
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: honeypot
  namespace: castle-honeypot
  labels:
    app: honeypot
spec:
  selector:
    app: honeypot
  ports:
    - name: http
      port: 80
      targetPort: 5150
---
# ---- Hardest lockdown in the cluster: this pod is the deliberate target. ----
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honeypot-default-deny
  namespace: castle-honeypot
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honeypot-allow-ingress
  namespace: castle-honeypot
spec:
  podSelector:
    matchLabels:
      app: honeypot
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5150
---
# Egress: DNS only. Honeypot mode captures locally (no IdP backchannel), so the
# decoy needs no outbound at all beyond name resolution — NO tenant namespace,
# no in-cluster service, no wider network. A fully compromised honeypot reaches
# nothing.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honeypot-allow-egress
  namespace: castle-honeypot
spec:
  podSelector:
    matchLabels:
      app: honeypot
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ---- SAMPLE decoy route (the control plane stamps one per codename) ----
# Identical in shape to a real tenant's Ingress — same annotations, same cert
# issuer, single-host cert — so it is indistinguishable from the outside. Only
# the backend (honeypot Service) and namespace differ.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary-nightfall
  namespace: castle-honeypot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nightfall.tenants.example.com
      secretName: canary-nightfall-tls
  rules:
    - host: nightfall.tenants.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: honeypot
                port:
                  number: 80
