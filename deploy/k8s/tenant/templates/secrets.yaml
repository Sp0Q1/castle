# Per-tenant secrets. For the initial phase these are templated from install
# values; move to sealed-secrets / external-secrets before real client data.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-app
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if .Values.database.internal }}
  DATABASE_URL: "postgres://{{ .Values.database.user }}:{{ required "secrets.dbPassword is required" .Values.secrets.dbPassword }}@{{ .Release.Name }}-postgres:5432/{{ .Values.database.name }}"
  {{- else }}
  DATABASE_URL: {{ required "database.externalUrl is required when database.internal=false" .Values.database.externalUrl | quote }}
  {{- end }}
  # Valid base64 even in proxy mode (loco base64-decodes it at boot).
  JWT_SECRET: {{ required "secrets.jwtSecret is required (base64)" .Values.secrets.jwtSecret | quote }}
  # Empty on purpose: castle binds to 127.0.0.1, so only the in-pod oauth2-proxy
  # can reach it. The loopback binding — not a shared header — is the isolation.
  CASTLE_PROXY_SECRET: ""
  {{- if .Values.oauth2Proxy.enabled }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ required "secrets.oauth2ClientSecret is required" .Values.secrets.oauth2ClientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ required "secrets.oauth2CookieSecret is required" .Values.secrets.oauth2CookieSecret | quote }}
  {{- end }}
{{- if .Values.database.internal }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app: {{ .Release.Name }}-postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
{{- end }}
