# Loco configuration file documentation

# Application logging configuration
logger:
  enable: true
  pretty_backtrace: false
  # Log level, options: trace, debug, info, warn or error.
  level: info
  # Structured JSON logs are easier to ship in production.
  format: json

# Web server configuration
server:
  port: {{ get_env(name="PORT", default="5150") }}
  # Bind to all interfaces so the service is reachable inside a container.
  binding: 0.0.0.0
  # The public URL mailers and links should point to.
  host: {{ get_env(name="HOST", default="http://localhost") }}
  middlewares:
    # Loco applies a 2MB body limit by default even with no config, which would
    # reject image uploads well below the 10 MiB cap in `controllers::uploads`.
    # Raised just above that cap so uploads.rs stays the single source of truth
    # for image size. JSON endpoints are NOT protected by this number — their
    # real bound is the per-field limits in `crate::validation`.
    limit_payload:
      body_limit: 12mb
    # Security headers. Without this block loco defaults to enable:false, leaving
    # the SPA and all user-generated content with no CSP/nosniff/frame policy.
    # The CSP deliberately omits 'unsafe-inline' for scripts: the SPA loads only
    # external bundles, so injected inline script cannot run. Inline STYLES are
    # allowed because the markdown editor and mermaid inject them.
    # NOTE: verify diagrams/editor still render after changing this.
    secure_headers:
      enable: true
      preset: github
      overrides:
        Content-Security-Policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
        X-Content-Type-Options: "nosniff"
        Referrer-Policy: "no-referrer"
    # Serve the built React SPA (run `npm --prefix frontend run build` first).
    # API routes under /api take precedence; the fallback serves index.html so
    # client-side routes like /projects/1 resolve to the SPA.
    static:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/"
        path: "frontend/dist"
      fallback: "frontend/dist/index.html"

# Worker Configuration
workers:
  mode: BackgroundAsync

# Mailer Configuration.
mailer:
  smtp:
    enable: true
    host: {{ get_env(name="MAILER_HOST", default="localhost") }}
    port: {{ get_env(name="MAILER_PORT", default="1025") }}
    secure: {{ get_env(name="MAILER_SECURE", default="false") }}

# Database Configuration
database:
  # The connection URI should be supplied via the environment in production.
  uri: {{ get_env(name="DATABASE_URL", default="sqlite://castle_production.sqlite?mode=rwc") }}
  enable_logging: false
  # Milliseconds. 500ms is fine for local sqlite but too tight for a networked
  # Postgres first-connect (pool times out -> crashloop); use realistic values.
  connect_timeout: {{ get_env(name="DB_CONNECT_TIMEOUT", default="5000") }}
  idle_timeout: {{ get_env(name="DB_IDLE_TIMEOUT", default="30000") }}
  min_connections: {{ get_env(name="DB_MIN_CONNECTIONS", default="1") }}
  max_connections: {{ get_env(name="DB_MAX_CONNECTIONS", default="10") }}
  # Run pending migrations on boot.
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false

# Authentication Configuration
auth:
  # JWT authentication
  jwt:
    # loco base64-decodes this secret, so JWT_SECRET must be a valid base64
    # string — generate one with `openssl rand -base64 48`.
    # NO DEFAULT ON PURPOSE: a committed placeholder would become a live signing
    # key for anyone who forgets to set it (forgeable tokens for any user). With
    # no default the config fails to render and the app refuses to start.
    secret: {{ get_env(name="JWT_SECRET") }}
    # Token expiration time in seconds
    expiration: 604800 # 7 days

# App-specific settings (parsed by src/security.rs).
settings:
  # "proxy" = run behind oauth2-proxy + Keycloak (this app trusts the proxy's
  # identity headers and manages no passwords). "jwt" = built-in login/register.
  # Env-overridable so one image can run either mode (the chart sets it from
  # oauth2Proxy.enabled).
  auth_mode: {{ get_env(name="CASTLE_AUTH_MODE", default="proxy") }}
  # Decoy mode: capture submitted credentials + attacker metadata to the
  # `castle::honeypot` log target and return believable responses (no real DB).
  # Set only on canary instances (the chart sets it from .Values.honeypot).
  honeypot: {{ get_env(name="CASTLE_HONEYPOT", default="false") }}
  proxy:
    # Identity headers injected by oauth2-proxy. Full reverse-proxy mode sets the
    # x-forwarded-* variants; an nginx/ingress auth_request setup with
    # --set-xauthrequest sets x-auth-request-* instead.
    email_header: x-forwarded-email
    name_header: x-forwarded-preferred-username
    groups_header: x-forwarded-groups
    # Defense-in-depth: a secret only the proxy injects (leave empty to rely on
    # network isolation alone). Set both the header name and the value.
    shared_secret_header: x-castle-proxy-secret
    shared_secret: {{ get_env(name="CASTLE_PROXY_SECRET", default="") }}
    # Keycloak groups (leaf names) that grant each platform role; unmapped users
    # default to least privilege (client).
    manager_group: castle-managers
    staff_group: castle-staff
    client_group: castle-clients
    # Sign-out target. For a full logout that also ends the Keycloak session,
    # set this to oauth2-proxy's sign-out chained to the IdP end-session endpoint:
    #   /oauth2/sign_out?rd=<url-encoded {issuer}/protocol/openid-connect/logout
    #     ?post_logout_redirect_uri=<app-url>&client_id=castle>
    # (also add that post_logout_redirect_uri to the Keycloak client, and add the
    # IdP host to oauth2-proxy --whitelist-domain). Falls back to a proxy-only
    # sign-out if unset.
    logout_url: {{ get_env(name="CASTLE_LOGOUT_URL", default="/oauth2/sign_out?rd=/") }}
