name: Security

# Vulnerability, secret and misconfiguration scanning.
#
# Two rules of thumb encoded below:
#   * anything with a *verifiable* answer (a leaked live credential, a known
#     CVE, a Semgrep rule match) fails the build;
#   * anything heuristic (Kubernetes/Dockerfile misconfiguration opinions)
#     reports to the Security tab but does not block, because this repo
#     deliberately diverges from some defaults and a noisy gate gets ignored.
#
# The weekly schedule matters as much as the push trigger: a new CVE lands
# against unchanged code, and nothing else would notice.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: a credential deleted in a later commit is still a
          # leaked credential, and this repo is public.
          fetch-depth: 0

      # Actions are SHA-pinned throughout, but the *scanner* images deliberately
      # float on :latest — a detection engine pinned to last quarter's build
      # stops finding this quarter's leaked token format. The trade is accepted
      # knowingly: these containers only read the checkout and cannot write to
      # the repository.
      #
      # --only-verified means findings are credentials TruffleHog authenticated
      # against the live provider — near-zero false positives, so failing is safe.
      - name: Scan git history for verified secrets
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --fail --json

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Semgrep OSS CLI, no account or token needed. If the licensing of the
      # registry rules ever becomes a problem, OpenGrep (a fork of the OSS
      # engine) is a drop-in replacement for this step.
      - run: pip install --disable-pip-version-check semgrep

      # Two passes over the same rules: the SARIF file feeds the Security tab,
      # the text pass is what a human reads in the log. `--sarif --output`
      # suppresses console findings entirely, so without this a failure shows a
      # count and nothing else. The rule cache makes the second pass cheap.
      - name: Scan
        id: scan
        run: |
          set -o pipefail
          args=(
            --config p/default
            --config p/rust
            --config p/typescript
            --config p/react
            --config p/secrets
            --config p/dockerfile
            --config p/github-actions
            --metrics off
            --exclude frontend/dist
            --exclude target
            --exclude src/models/_entities
          )
          semgrep scan "${args[@]}" --sarif --output semgrep.sarif
          semgrep scan "${args[@]}" --error | tee semgrep.txt

      - name: Report findings in the job summary
        if: failure() && steps.scan.outcome == 'failure'
        run: |
          {
            echo '## Semgrep findings'
            echo '```'
            tail -c 60000 semgrep.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  rust-deps:
    name: Dependencies (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # Prebuilt binary — `cargo install cargo-audit` would rebuild it every run.
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-audit
      - name: Audit against the RustSec advisory DB
        run: cargo audit --deny warnings

  npm-deps:
    name: Dependencies (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # `high` rather than `moderate`: the frontend tree carries a long tail of
      # low/moderate advisories in build-only packages that cannot reach a user.
      # Review those from the Dependabot alerts, not from a red build.
      - run: npm audit --audit-level=high

  containers:
    name: Image and manifest scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # The image build, not the scan, is what made this job slow: 305s of a
      # 333s job, because a from-scratch dependency compile ran every time.
      # The Dockerfile now isolates dependencies in their own layer, and this
      # cache carries that layer between runs — so a source-only change reuses
      # it and only recompiles castle itself.
      - name: Build the application image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: castle:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Proves the image actually works before anything else looks at it.
      #
      # This exists because the dependency-caching layout in the Dockerfile has
      # a silent failure mode: the dependency layer is built against stub
      # sources, and if cargo ever decides the real sources are not newer (it
      # compares mtimes, and COPY preserves them), the build "succeeds" and
      # ships a binary that does nothing. Trivy would not notice — it scans
      # layers for CVEs, it never runs the program. Nor would any other job
      # here. A stub binary would have been published green.
      - name: Smoke-test the image
        run: |
          set -euo pipefail
          # A stub binary prints nothing; the real CLI lists its subcommands.
          docker run --rm castle:ci --help | grep -q '^  start' \
            || { echo "::error::image binary does not behave like castle-cli"; exit 1; }
          # The SPA is served from disk at runtime, so an image without it is
          # broken in a way no Rust check can see.
          docker run --rm --entrypoint sh castle:ci -c 'test -s frontend/dist/index.html' \
            || { echo "::error::built SPA missing from the image"; exit 1; }

      # Blocking: known CVEs in what we actually ship.
      - name: Scan image for HIGH/CRITICAL vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              castle:ci

      # Non-blocking: Dockerfile and Kubernetes hardening opinions. Reported to
      # the Security tab for triage; see docs/production-readiness.md for the
      # divergences that are intentional.
      - name: Scan Dockerfile and manifests for misconfiguration
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:latest config /src \
              --exit-code 0 \
              --format sarif \
              --output /src/trivy-config.sarif

      - name: Upload results
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
