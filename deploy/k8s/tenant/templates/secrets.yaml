{{- if not .Values.secrets.external }}
# Per-tenant secrets templated from install values — DEV/LOCAL CONVENIENCE ONLY.
# For production set `secrets.external: true` and provide the `<release>-app`
# (and `<release>-db`) Secrets out-of-band via SealedSecrets / External Secrets,
# so no plaintext secret ever lives in values or `--set`. The Deployment and
# StatefulSet reference these Secrets by name either way. See deploy/k8s/secrets/.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-app
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if .Values.database.internal }}
  DATABASE_URL: "postgres://{{ .Values.database.user }}:{{ required "secrets.dbPassword is required" .Values.secrets.dbPassword }}@{{ .Release.Name }}-postgres:5432/{{ .Values.database.name }}"
  {{- else }}
  DATABASE_URL: {{ required "database.externalUrl is required when database.internal=false" .Values.database.externalUrl | quote }}
  {{- end }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required (base64)" .Values.secrets.jwtSecret | quote }}
  CASTLE_PROXY_SECRET: ""
  {{- if .Values.oauth2Proxy.enabled }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ required "secrets.oauth2ClientSecret is required" .Values.secrets.oauth2ClientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ required "secrets.oauth2CookieSecret is required" .Values.secrets.oauth2CookieSecret | quote }}
  {{- end }}
{{- if .Values.database.internal }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app: {{ .Release.Name }}-postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
{{- end }}
{{- end }}
{{- if .Values.secrets.external }}
# secrets.external=true: the chart creates NO Secret. Provide these out-of-band
# (committed as SealedSecrets, decrypted in-cluster by the controller):
#   {{ .Release.Name }}-app : DATABASE_URL, JWT_SECRET, CASTLE_PROXY_SECRET{{ if .Values.oauth2Proxy.enabled }}, OAUTH2_PROXY_CLIENT_SECRET, OAUTH2_PROXY_COOKIE_SECRET{{ end }}
{{- if .Values.database.internal }}
#   {{ .Release.Name }}-db  : POSTGRES_PASSWORD
{{- end }}
{{- end }}
